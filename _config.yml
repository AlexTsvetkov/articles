title: SAP Commerce & Cloud Native Articles
description: Deep-dive technical articles on SAP Commerce Cloud and Cloud Native Architecture
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

exclude:
  - .DS_Store
  - .gitignore
  - prompt.md
  - "*/prompts.md"
  - "*/medium.com"
  - "*/dev.to"
  - "*/community.sap.com"
  - "*/linkedin.com"

defaults:
  - scope:
      path: ""
    values:
      layout: default